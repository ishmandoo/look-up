<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>look up</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%88%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --surface: #131b2e;
      --text: #e8edf7;
      --muted: #8b96ad;
      --accent: #5fb4ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px max(24px, env(safe-area-inset-bottom));
      text-align: center;
      gap: 16px;
    }
    .status {
      color: var(--muted);
      font-size: 1rem;
      max-width: 320px;
      line-height: 1.4;
    }
    .silhouette {
      width: 160px;
      height: 160px;
      color: var(--accent);
      transition: transform 0.6s ease;
    }
    .silhouette svg { width: 100%; height: 100%; display: block; }
    .photo {
      width: 100%;
      max-width: 320px;
      height: auto;
      border-radius: 12px;
      display: block;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
    }
    .credit { font-size: 0.72rem; color: var(--muted); margin-top: -8px; }
    .credit a { color: var(--muted); }
    .callsign {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .category {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: -8px;
    }
    .route { font-size: 1.25rem; font-weight: 600; color: var(--text); max-width: 320px; line-height: 1.3; }
    .route .arrow { color: var(--accent); margin: 0 6px; }
    .route-sub { color: var(--muted); font-size: 0.8rem; letter-spacing: 0.05em; margin-top: -10px; }
    .owner { font-size: 1rem; color: var(--text); }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(110px, 1fr));
      gap: 10px 18px;
      margin-top: 8px;
      width: 100%;
      max-width: 340px;
    }
    .info-cell {
      background: var(--surface);
      border-radius: 12px;
      padding: 10px 12px;
      text-align: left;
    }
    .info-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .info-value { font-size: 1.1rem; font-weight: 600; margin-top: 2px; }
    .radar { width: 168px; height: 168px; margin-top: 6px; }
    .radar svg { width: 100%; height: 100%; display: block; }
    .radar-cap { color: var(--text); font-size: 0.95rem; margin-top: -4px; }
    .radar-cap .deg { color: var(--muted); }
    .refresh-note { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
    .manual-location { display: flex; gap: 8px; margin-top: 8px; }
    .manual-location input {
      width: 110px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #2a3650;
      background: var(--surface);
      color: var(--text);
    }
    .manual-location button {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #06192e;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
  "use strict";

  // ---- config ----------------------------------------------------------
  const POLL_INTERVAL_MS = 25000;
  const SEARCH_RADIUS_NM = 12; // reaches Logan (~7nm SE) plus the climb-out corridor
  const NM_TO_KM = 1.852;
  // The radar is oriented so the way your house faces points up. Compass
  // bearing your house faces, in degrees (N=0, E=90, S=180, W=270).
  // ~165 = slightly east of due south. Tweak to taste.
  const FACING_BEARING_DEG = 165;

  // ---- geolocation -----------------------------------------------------
  function getCurrentPosition() {
    return new Promise((resolve, reject) => {
      if (!("geolocation" in navigator)) {
        reject(new Error("Geolocation is not supported on this device."));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
        (err) => reject(err),
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
      );
    });
  }

  // ---- airplanes.live --------------------------------------------------
  // Single API call returns aircraft near a point, already enriched with
  // type/registration/owner plus pre-computed distance + bearing. It sends
  // Access-Control-Allow-Origin: *, so the browser can call it directly.
  async function fetchNearby(center, radiusNm) {
    const url = `https://api.airplanes.live/v2/point/${center.lat.toFixed(4)}/${center.lon.toFixed(4)}/${radiusNm}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error("airplanes.live request failed: " + res.status);
    const data = await res.json();
    return (data.ac || []).map(normalize);
  }

  function normalize(raw) {
    const trimOrNull = (v) => (typeof v === "string" && v.trim() ? v.trim() : null);
    return {
      hex: (raw.hex || "").trim(),
      callsign: trimOrNull(raw.flight),
      registration: trimOrNull(raw.r),
      icaoType: trimOrNull(raw.t),
      description: trimOrNull(raw.desc),
      owner: trimOrNull(raw.ownOp),
      altitudeFt: typeof raw.alt_baro === "number" ? raw.alt_baro : null,
      groundSpeedKt: typeof raw.gs === "number" ? raw.gs : null,
      headingDeg: typeof raw.track === "number" ? raw.track : null,
      distanceNm: typeof raw.dst === "number" ? raw.dst : null,
      bearingDeg: typeof raw.dir === "number" ? raw.dir : null,
      lat: typeof raw.lat === "number" ? raw.lat : null,
      lon: typeof raw.lon === "number" ? raw.lon : null,
      verticalRateFpm:
        typeof raw.baro_rate === "number" ? raw.baro_rate
        : typeof raw.geom_rate === "number" ? raw.geom_rate
        : null,
    };
  }

  // We want the Logan runway 33L departures that stream NW over Arlington.
  // Detect them geometrically from raw ADS-B data (reliable), not from the
  // callsign route (often wrong for a just-departed aircraft): a plane that
  // is low, climbing, and physically close to Logan just took off from it.
  // The proximity-to-Logan gate also rejects climbing GA traffic out of
  // nearby Hanscom Field (KBED).
  const LOGAN = { lat: 42.3656, lon: -71.0096 }; // Boston Logan reference point
  const DEPARTURE_MAX_ALT_FT = 15000; // over Arlington they're well below this
  const DEPARTURE_MIN_CLIMB_FPM = 300;
  const LOGAN_RADIUS_NM = 12; // liftoff through a bit past Arlington

  function haversineNm(a, b) {
    const R = 3440.065; // nautical miles
    const toRad = (d) => (d * Math.PI) / 180;
    const dLat = toRad(b.lat - a.lat), dLon = toRad(b.lon - a.lon);
    const la1 = toRad(a.lat), la2 = toRad(b.lat);
    const h = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(h));
  }

  function isLoganDeparture(a) {
    if (a.lat == null || a.lon == null || a.altitudeFt == null || a.verticalRateFpm == null || a.distanceNm == null) {
      return false;
    }
    return (
      a.altitudeFt <= DEPARTURE_MAX_ALT_FT &&
      a.verticalRateFpm >= DEPARTURE_MIN_CLIMB_FPM &&
      haversineNm(a, LOGAN) <= LOGAN_RADIUS_NM
    );
  }

  // Among Logan departures, the one nearest you is the most overhead.
  function pickLoganDeparture(list) {
    const deps = list.filter(isLoganDeparture);
    if (deps.length === 0) return null;
    return deps.reduce((best, a) =>
      (a.distanceNm ?? Infinity) < (best.distanceNm ?? Infinity) ? a : best
    );
  }

  // ---- route lookup (adsbdb.com) --------------------------------------
  // airplanes.live doesn't carry route info, so look up origin/destination
  // by callsign from adsbdb.com (free, no key, sends CORS: *). Results are
  // cached per callsign — including misses — so we don't re-query each tick.
  const routeCache = new Map();
  async function fetchRoute(callsign) {
    const key = (callsign || "").trim();
    if (!key) return null;
    if (routeCache.has(key)) return routeCache.get(key);
    let result = null;
    try {
      const res = await fetch("https://api.adsbdb.com/v0/callsign/" + encodeURIComponent(key));
      if (res.ok) {
        const data = await res.json();
        const fr = data && data.response && data.response.flightroute;
        if (fr && fr.origin && fr.destination) {
          result = {
            originCode: fr.origin.iata_code || fr.origin.icao_code || null,
            originIcao: fr.origin.icao_code || null,
            originCity: fr.origin.municipality || null,
            destCode: fr.destination.iata_code || fr.destination.icao_code || null,
            destCity: fr.destination.municipality || null,
          };
        }
      }
    } catch (e) {
      /* network/parse error — treat as no route, don't disrupt the card */
    }
    routeCache.set(key, result);
    return result;
  }

  // ---- aircraft photo (planespotters.net) -----------------------------
  // A real photo of the exact airframe (correct livery), keyed by hex.
  // planespotters 403s server-side bots but returns 200 to real browsers.
  // We preload the image before committing, so a broken URL silently falls
  // back to the silhouette instead of flashing a broken image. Cached per
  // hex (including misses).
  const photoCache = new Map();
  function preloadImage(src) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(true);
      img.onerror = () => resolve(false);
      img.src = src;
      setTimeout(() => resolve(false), 8000);
    });
  }
  async function fetchPhoto(hex) {
    const key = (hex || "").trim().toLowerCase();
    if (!key) return null;
    if (photoCache.has(key)) return photoCache.get(key);
    let result = null;
    try {
      const res = await fetch("https://api.planespotters.net/pub/photos/hex/" + encodeURIComponent(key));
      if (res.ok) {
        const data = await res.json();
        const p = data && data.photos && data.photos[0];
        const src = p && p.thumbnail_large && p.thumbnail_large.src;
        if (src && (await preloadImage(src))) {
          result = {
            src: src,
            photographer: p.photographer || "planespotters.net",
            link: p.link || "https://www.planespotters.net",
          };
        }
      }
    } catch (e) {
      /* network/parse error — fall back to the silhouette */
    }
    photoCache.set(key, result);
    return result;
  }

  // ---- aircraft type -> category --------------------------------------
  const TYPE_MAP = {
    // narrowbody twinjets
    A318: "narrowbody", A319: "narrowbody", A320: "narrowbody", A321: "narrowbody",
    A19N: "narrowbody", A20N: "narrowbody", A21N: "narrowbody",
    B731: "narrowbody", B732: "narrowbody", B733: "narrowbody", B734: "narrowbody",
    B735: "narrowbody", B736: "narrowbody", B737: "narrowbody", B738: "narrowbody",
    B739: "narrowbody", B38M: "narrowbody", B39M: "narrowbody", B3XM: "narrowbody",
    MD80: "narrowbody", MD90: "narrowbody",
    // widebody twinjets
    A330: "widebody-twin", A332: "widebody-twin", A333: "widebody-twin",
    A338: "widebody-twin", A339: "widebody-twin",
    A350: "widebody-twin", A35K: "widebody-twin",
    B767: "widebody-twin", B762: "widebody-twin", B763: "widebody-twin",
    B777: "widebody-twin", B772: "widebody-twin", B773: "widebody-twin", B77W: "widebody-twin", B77L: "widebody-twin",
    B787: "widebody-twin", B788: "widebody-twin", B789: "widebody-twin", B78X: "widebody-twin",
    // widebody quads
    A340: "widebody-quad", A346: "widebody-quad",
    A380: "widebody-quad", A388: "widebody-quad",
    B747: "widebody-quad", B744: "widebody-quad", B748: "widebody-quad",
    // regional jets / turboprops
    CRJ2: "regional-jet", CRJ7: "regional-jet", CRJ9: "regional-jet", CRJX: "regional-jet",
    E135: "regional-jet", E145: "regional-jet", E170: "regional-jet", E175: "regional-jet",
    E190: "regional-jet", E195: "regional-jet", E75L: "regional-jet", E75S: "regional-jet",
    AT72: "turboprop", AT45: "turboprop", AT76: "turboprop", DH8A: "turboprop", DH8D: "turboprop",
    SF34: "turboprop", B350: "turboprop",
    // general aviation
    C172: "ga-single", C152: "ga-single", C182: "ga-single", SR22: "ga-single", P28A: "ga-single",
    PA28: "ga-single", PA34: "ga-single", BE36: "ga-single", M20P: "ga-single",
    // helicopters
    R44: "helicopter", R66: "helicopter", EC35: "helicopter", EC30: "helicopter",
    B06: "helicopter", AS50: "helicopter", H60: "helicopter", B407: "helicopter",
  };

  const CATEGORY_LABEL = {
    "narrowbody": "Narrowbody jet",
    "widebody-twin": "Widebody twinjet",
    "widebody-quad": "Widebody quadjet",
    "regional-jet": "Regional jet",
    "turboprop": "Turboprop",
    "ga-single": "Light aircraft",
    "helicopter": "Helicopter",
    "unknown": "Aircraft",
  };

  function categorize(icaoType) {
    if (!icaoType) return "unknown";
    return TYPE_MAP[icaoType.trim().toUpperCase()] || "unknown";
  }

  // ---- silhouettes -----------------------------------------------------
  // Top-down shapes, nose up, viewBox 0 0 200 200, built from polygons.
  function fuselage(noseY, tailY, halfWidth) {
    const midY = (noseY + tailY) / 2;
    return `<polygon points="100,${noseY} ${100 + halfWidth},${midY} ${100 + halfWidth * 0.7},${tailY} 100,${tailY + 6} ${100 - halfWidth * 0.7},${tailY} ${100 - halfWidth},${midY}" />`;
  }
  function wings(wingY, halfSpan, chord) {
    return `<polygon points="100,${wingY} ${100 + halfSpan},${wingY + chord} ${100 + halfSpan * 0.4},${wingY + chord * 1.6} ${100 - halfSpan * 0.4},${wingY + chord * 1.6} ${100 - halfSpan},${wingY + chord} 100,${wingY}" />`;
  }
  function tailplane(tailY, halfSpan) {
    return `<polygon points="100,${tailY - 14} ${100 + halfSpan},${tailY + 6} ${100 + halfSpan * 0.3},${tailY + 14} ${100 - halfSpan * 0.3},${tailY + 14} ${100 - halfSpan},${tailY + 6} 100,${tailY - 14}" />`;
  }
  function jet(o) {
    return fuselage(8, o.tailY, o.fuselageHalfWidth) + wings(o.wingY, o.halfSpan, o.chord) + tailplane(o.tailY, o.tailHalfSpan);
  }
  function svgWrap(content) {
    return `<svg viewBox="0 0 200 200" fill="currentColor">${content}</svg>`;
  }

  const SILHOUETTES = {
    "narrowbody": svgWrap(jet({ wingY: 100, halfSpan: 80, chord: 26, tailHalfSpan: 26, fuselageHalfWidth: 12, tailY: 178 })),
    "widebody-twin": svgWrap(
      jet({ wingY: 96, halfSpan: 92, chord: 30, tailHalfSpan: 32, fuselageHalfWidth: 16, tailY: 180 }) +
      `<circle cx="58" cy="118" r="7" /><circle cx="142" cy="118" r="7" />`
    ),
    "widebody-quad": svgWrap(
      jet({ wingY: 96, halfSpan: 92, chord: 30, tailHalfSpan: 32, fuselageHalfWidth: 16, tailY: 180 }) +
      `<circle cx="46" cy="112" r="6" /><circle cx="70" cy="122" r="6" /><circle cx="130" cy="122" r="6" /><circle cx="154" cy="112" r="6" />`
    ),
    "regional-jet": svgWrap(jet({ wingY: 92, halfSpan: 58, chord: 20, tailHalfSpan: 20, fuselageHalfWidth: 9, tailY: 170 })),
    "turboprop": svgWrap(
      fuselage(10, 178, 8) + wings(86, 76, 16) + tailplane(178, 20) +
      `<circle cx="50" cy="90" r="9" /><circle cx="150" cy="90" r="9" />`
    ),
    "ga-single": svgWrap(fuselage(14, 175, 6) + wings(92, 50, 12) + tailplane(175, 16)),
    "helicopter": svgWrap(
      `<ellipse cx="100" cy="118" rx="18" ry="36" /><rect x="98" y="150" width="4" height="32" />` +
      `<rect x="92" y="178" width="16" height="6" /><rect x="18" y="64" width="164" height="5" rx="2.5" /><circle cx="100" cy="66" r="6" />`
    ),
    "unknown": svgWrap(jet({ wingY: 98, halfSpan: 74, chord: 24, tailHalfSpan: 24, fuselageHalfWidth: 11, tailY: 176 })),
  };

  function silhouetteFor(category) {
    return SILHOUETTES[category] || SILHOUETTES.unknown;
  }

  // ---- rendering -------------------------------------------------------
  const app = document.getElementById("app");
  let location_ = null;
  let pollHandle = null;

  function escapeHtml(input) {
    return String(input).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function escapeAttr(input) {
    return escapeHtml(input).replace(/"/g, "&quot;");
  }

  function renderStatus(message) {
    app.innerHTML = `<p class="status">${escapeHtml(message)}</p>`;
  }

  function renderNoDepartures() {
    app.innerHTML =
      `<div class="silhouette">${silhouetteFor("unknown")}</div>` +
      `<p class="status">No Logan departures overhead right now.<br>` +
      `The runway 33L corridor is busiest when winds are from the northwest. Checking again…</p>`;
  }

  function infoCell(label, value) {
    return `<div class="info-cell"><div class="info-label">${escapeHtml(label)}</div><div class="info-value">${escapeHtml(value)}</div></div>`;
  }

  function routeHtml(route) {
    // We already know (geometrically) the plane is departing Logan. adsbdb's
    // callsign route is only trustworthy when it agrees the origin is Boston;
    // for many departures it returns the inbound leg (Boston as destination),
    // which would mislead — so in that case we show only what we're sure of.
    const trustworthy = route && route.originIcao === "KBOS" && (route.destCity || route.destCode);
    if (trustworthy) {
      const dest = route.destCity || route.destCode;
      const codes = route.destCode ? `<p class="route-sub">BOS → ${escapeHtml(route.destCode)}</p>` : "";
      return `<p class="route">Boston<span class="arrow">→</span>${escapeHtml(dest)}</p>` + codes;
    }
    return `<p class="route">Departing Boston Logan</p>`;
  }

  const COMPASS = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
  function compass(deg) {
    return COMPASS[Math.round(deg / 45) % 8];
  }

  // You-centered radar: you at the middle, the plane placed by its bearing
  // (direction from you) and distance, scaled to the search radius. Rotated
  // so the way your house faces (FACING_BEARING_DEG) points UP — the accent
  // tick at the top marks your view; the N/E/S/W labels swing accordingly.
  // The marker points in the plane's true travel heading. Uses only the
  // bearing/distance the API already gives us — no map tiles, no deps.
  function radarHtml(a) {
    const cx = 100, cy = 100, maxR = 78;
    const fullScaleNm = SEARCH_RADIUS_NM;
    const bearing = a.bearingDeg != null ? a.bearingDeg : 0;
    const distNm = a.distanceNm != null ? Math.min(a.distanceNm, fullScaleNm) : 0;
    const r = (distNm / fullScaleNm) * maxR;

    // Map a true compass bearing to an x,y on the radar, with the facing
    // direction rotated to the top.
    const toXY = (trueDeg, radius) => {
      const ang = ((trueDeg - FACING_BEARING_DEG) * Math.PI) / 180;
      return [cx + radius * Math.sin(ang), cy - radius * Math.cos(ang)];
    };

    const [px, py] = toXY(bearing, r);
    const markerRot = ((a.headingDeg != null ? a.headingDeg : bearing) - FACING_BEARING_DEG).toFixed(1);

    const dirLabels = [[0, "N"], [90, "E"], [180, "S"], [270, "W"]]
      .map(([deg, t]) => {
        const [lx, ly] = toXY(deg, maxR + 13);
        return `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" fill="var(--muted)" font-size="12" text-anchor="middle" dominant-baseline="middle" font-family="system-ui">${t}</text>`;
      })
      .join("");

    const svg =
      `<svg viewBox="0 0 200 200">` +
        `<circle cx="100" cy="100" r="${maxR}" fill="none" stroke="#2a3650" stroke-width="1.5"/>` +
        `<circle cx="100" cy="100" r="${(maxR * 2 / 3).toFixed(1)}" fill="none" stroke="#1c2840" stroke-width="1"/>` +
        `<circle cx="100" cy="100" r="${(maxR / 3).toFixed(1)}" fill="none" stroke="#1c2840" stroke-width="1"/>` +
        `<line x1="100" y1="${100 - maxR}" x2="100" y2="${100 + maxR}" stroke="#1c2840" stroke-width="1"/>` +
        `<line x1="${100 - maxR}" y1="100" x2="${100 + maxR}" y2="100" stroke="#1c2840" stroke-width="1"/>` +
        // "your view" tick at the top
        `<path d="M100 ${100 - maxR - 11} L95 ${100 - maxR - 2} L105 ${100 - maxR - 2} Z" fill="var(--accent)"/>` +
        dirLabels +
        `<circle cx="100" cy="100" r="3.5" fill="var(--text)"/>` +
        `<g transform="translate(${px.toFixed(1)} ${py.toFixed(1)}) rotate(${markerRot})">` +
          `<path d="M0,-9 L6,7 L0,3.5 L-6,7 Z" fill="var(--accent)"/>` +
        `</g>` +
      `</svg>`;
    return `<div class="radar">${svg}</div>`;
  }

  function radarCaptionHtml(a) {
    if (a.bearingDeg == null) return "";
    const b = Math.round(a.bearingDeg);
    return `<p class="radar-cap">Look ${compass(a.bearingDeg)} <span class="deg">· ${b}°</span></p>`;
  }

  function heroHtml(a, category, heading, photo) {
    if (photo) {
      const alt = a.description || a.icaoType || "aircraft";
      return (
        `<img class="photo" src="${escapeAttr(photo.src)}" alt="${escapeAttr(alt)}" />` +
        `<p class="credit">📷 <a href="${escapeAttr(photo.link)}" target="_blank" rel="noopener">${escapeHtml(photo.photographer)}</a></p>`
      );
    }
    return `<div class="silhouette" style="transform: rotate(${heading}deg)">${silhouetteFor(category)}</div>`;
  }

  function renderAircraft(a, route, photo) {
    const category = categorize(a.icaoType);
    const heading = a.headingDeg != null ? a.headingDeg : 0;
    const distanceKm = a.distanceNm != null ? a.distanceNm * NM_TO_KM : null;
    const typeLine = a.description || a.icaoType || CATEGORY_LABEL[category];

    app.innerHTML =
      heroHtml(a, category, heading, photo) +
      `<p class="callsign">${escapeHtml(a.callsign || "Unknown callsign")}</p>` +
      `<p class="category">${escapeHtml(typeLine)}${a.registration ? " · " + escapeHtml(a.registration) : ""}</p>` +
      routeHtml(route) +
      (a.owner ? `<p class="owner">${escapeHtml(a.owner)}</p>` : "") +
      `<div class="info-grid">` +
        infoCell("Altitude", a.altitudeFt != null ? a.altitudeFt.toLocaleString() + " ft" : "—") +
        infoCell("Speed", a.groundSpeedKt != null ? Math.round(a.groundSpeedKt) + " kt" : "—") +
        infoCell("Heading", a.headingDeg != null ? Math.round(a.headingDeg) + "°" : "—") +
        infoCell("Distance", distanceKm != null ? distanceKm.toFixed(1) + " km" : "—") +
      `</div>` +
      radarHtml(a) +
      radarCaptionHtml(a) +
      `<p class="refresh-note">Updates every ${POLL_INTERVAL_MS / 1000}s</p>`;
  }

  function renderLocationDenied() {
    app.innerHTML =
      `<p class="status">Location access is needed to find the plane above you. ` +
      `Enable it in your browser settings, or enter coordinates manually.</p>` +
      `<form class="manual-location" id="manual-form">` +
        `<input type="number" step="any" placeholder="Latitude" id="manual-lat" required />` +
        `<input type="number" step="any" placeholder="Longitude" id="manual-lon" required />` +
        `<button type="submit">Go</button>` +
      `</form>`;
    document.getElementById("manual-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const lat = Number(document.getElementById("manual-lat").value);
      const lon = Number(document.getElementById("manual-lon").value);
      if (Number.isFinite(lat) && Number.isFinite(lon)) {
        location_ = { lat, lon };
        startPolling();
      }
    });
  }

  // ---- main loop -------------------------------------------------------
  let renderId = 0;
  async function tick() {
    if (!location_) return;
    try {
      const myId = ++renderId;
      const nearby = await fetchNearby(location_, SEARCH_RADIUS_NM);

      // Strict Logan-departures mode: only planes climbing out of Logan.
      const chosen = pickLoganDeparture(nearby);
      if (!chosen) { renderNoDepartures(); return; }

      // Show the plane right away, then enrich with route + photo once loaded.
      // The route is best-effort (callsign-based) and shows where it's headed.
      renderAircraft(chosen, null, null);
      const [route, photo] = await Promise.all([
        chosen.callsign ? fetchRoute(chosen.callsign) : Promise.resolve(null),
        chosen.hex ? fetchPhoto(chosen.hex) : Promise.resolve(null),
      ]);
      if (myId === renderId) renderAircraft(chosen, route, photo);
    } catch (e) {
      renderStatus("Couldn't reach flight data. Retrying…");
    }
  }

  function startPolling() {
    tick();
    if (pollHandle) clearInterval(pollHandle);
    pollHandle = setInterval(tick, POLL_INTERVAL_MS);
  }

  async function init() {
    renderStatus("Finding your location…");
    try {
      location_ = await getCurrentPosition();
      startPolling();
    } catch (e) {
      renderLocationDenied();
    }
  }

  init();
  </script>
</body>
</html>
